server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:scrum;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: scrum-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256!!
  expiration: 86400000

logging:
  level:
    com.scrum: info
